---
- name: Create Ansible user with sudo access
  hosts: all
  become: yes
  gather_facts: false
  vars:
    ansible_user: ansible-awx
    ansible_password_hash: $6$rounds=5000$... # Replace with your hash from step 2
    sudo_group: wheel  # Use 'sudo' on Debian/Ubuntu, 'wheel' on RHEL/CentOS

  tasks:
    - name: Create the Ansible user
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        password: "{{ ansible_password_hash }}"
        groups: "{{ sudo_group }}"
        append: yes
        state: present
        createhome: yes
        shell: /bin/bash

    - name: Add SSH public key for passwordless login
      ansible.posix.authorized_key:
        user: "{{ ansible_user }}"
        state: present
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

    - name: Ensure sudoers entry for NOPASSWD
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: "^{{ ansible_user }}\\s"
        line: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL"
        validate: "visudo -cf %s"
        state: present
